# Named chains with pinned model slugs and prices.
# Slugs verified live on OpenRouter (2026-06); prices are per MILLION tokens
# (representative endpoint pricing) and drive budget.ts. They remain
# user-maintained config — adjust to your account's routing/pricing.
chains:
  cheap:
    executor: "qwen/qwen3-coder" # cheap MoE coder, supports tools
    fallback: "deepseek/deepseek-chat" # DeepSeek V3, second cheap model
    knight: "anthropic/claude-opus-4" # frontier escalation target, supports tools
  knight-only:
    executor: "anthropic/claude-opus-4"
    fallback: "anthropic/claude-opus-4"
    knight: "anthropic/claude-opus-4"
prices: # per million tokens (in = prompt, out = completion)
  "qwen/qwen3-coder": { in: 0.30, out: 1.00 }
  "deepseek/deepseek-chat": { in: 0.20, out: 0.80 }
  "anthropic/claude-opus-4": { in: 15.0, out: 75.0 }
