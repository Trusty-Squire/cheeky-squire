# Cross-executor gauntlet (pillar-3 test): same 20 tasks, same gates, same
# verbatim executor prompt, ZERO per-model tuning. One chain per executor;
# fallback = same model (isolates the executor through rung 3); knight = opus
# so rescue events are visible in the rung histogram as knight-rescues.
# Slugs + prices verified live on OpenRouter 2026-06-12 (tool-capable endpoints).
chains:
  glm:
    executor: "z-ai/glm-4.7"
    fallback: "z-ai/glm-4.7"
    knight: "anthropic/claude-opus-4"
  kimi:
    executor: "moonshotai/kimi-k2.6"
    fallback: "moonshotai/kimi-k2.6"
    knight: "anthropic/claude-opus-4"
  deepseek:
    executor: "deepseek/deepseek-v3.2"
    fallback: "deepseek/deepseek-v3.2"
    knight: "anthropic/claude-opus-4"
prices: # per million tokens
  "z-ai/glm-4.7": { in: 0.40, out: 1.75 }
  "moonshotai/kimi-k2.6": { in: 0.68, out: 3.41 }
  "deepseek/deepseek-v3.2": { in: 0.26, out: 0.40 }
  "anthropic/claude-opus-4": { in: 15.0, out: 75.0 }
